<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>百度注册</title>
<style type="text/css">
*{
    margin:0;
    padding:0;
    list-style:none;
}
.box{
    margin:100px auto;
    width:600px;
}
.wenzi{margin-top: 50px;}
.con{height:50px;}
.one{
    float: left;
    width:180px;
    height:50px;
    text-align: right;
    margin-right: 20px;
    line-height: 50px;
}
.two{
    float: left;
    line-height: 50px;
}
.con ul li{
    float: left;
    margin-right: 20px;
    height:50px;
    line-height: 50px;
}
.tu img{margin-top: 10px;}
.zc{margin-top: 10px;}
</style>
</head>
<body>
<form action="#" method="get">
<div class="box">
        <ul height="120">
            <li ><a href="#"><img src="images/logo_baidu.jpg" border="0"/></a></li>
            <li class="two"></li>
        </ul>
        <ul class="con">
            <li class="wenzi"><b>填写注册信息</b></li>
            <li class="two"></li>
        </ul>
        <ul class="con">
            <li class="one" align="right">邮箱:</li>
            <li class="two">
                <input type="email"  name="mail" multiple="true" pattern="^\w+([-+.]\w+)*@\w+([-.]\w+)*\.\w+([-.]\w+)*$" required/>
            </li>
        </ul>
        <ul class="con">
            <li class="one" align="right">密码:</li>
            <li class="two">
                <input type="password" name="password" pattern="^[a-zA-Z]\w{5,17}$" required/>
            </li>
        </ul>
        <ul class="con">
            <li class="one" align="right">确认密码:</li>
            <li class="two">
                <input type="password" name="confirm" required/>
            </li>
        </ul>
        <ul class="con">
            <li class="one" align="right">验证码:</li>
            <li class="two">
                <ul>
                    <li><input type="text" name="yz"  required/></li>
                    <li class="tu"><img src="images/yz.jpg"/></li>
                    <li><a href="#">看不清</a></li>
                </ul>
            </li>
        </ul>
        <ul class="con">
            <li class="one"></li>
            <li class="two">
                <input type="checkbox" checked="checked"/>我已阅读并接受<a href="#">《百度用户协议》</a>
            </li>
        </ul>
        <ul class="con">
            <li class="one"></li>
            <li class="two">
                <ul>
                    <li class="zc"><input type="image" src="images/button.jpg" /></li>
                    <li><input type="reset" value="重置信息" /></li>
                </ul>
            </li>
        </ul>
    </div>
</form>
</body>
</html>
