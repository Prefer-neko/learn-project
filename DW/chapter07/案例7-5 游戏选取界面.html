<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>游戏选取界面</title>
</head>
<body>
<form action="#" method="post" name="example">
请选择大区:<br />
<select>     
    <option>1区金戈铁马</option>
    <option>2区江山如画</option>
    <option>3区气吞山河</option>
    <option>3区刀光剑影</option>
</select>
<select>
	<option>请选择线路</option>   
    <optgroup label="网通">
        <option>网通线路1</option>
        <option>网通线路2</option>
    </optgroup>
        <optgroup label="电信">
        <option>电信线路1</option>
        <option>电信线路2</option>
    </optgroup>
</select><br /><br />
<input type="submit" value="确定" />
<input type="button" value="取消" />
</form>
</body>
</html>
