<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>字符批量替换工具界面</title>
</head>
<body>
<form action="#" method="post" name="example">
	<p>查找（需要替换的旧字符）</p>
    <textarea cols="60" rows="8">请在此输入要查找的文字。
    </textarea><br /><br />
    <p>替换为（新字符）</p>
    <textarea cols="60" rows="8">请在此输入要替换的文字。
    </textarea><br /><br />
    <input type="checkbox" />区分大小写
    <input type="checkbox" />保留备份
    <input type="checkbox" />仅替换字词<br /><br />
	<input type="submit" value="替换"/>
    <input type="reset" />
    <input type="button" value="保存"/>
</form>
</body>
</html>
