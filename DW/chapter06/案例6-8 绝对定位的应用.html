<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>绝对定位的应用</title>
<style type="text/css">
.wenti{
	width:502px; 
	height:401px; 
	margin:10px auto;
	background:url(images/votebg.jpg) no-repeat; 
	position:relative; 
	} 
.close{
	width:16px; 
	height:16px; 
	display:block; 
	top:7px; 
	right:8px; 
	position:absolute; 
	cursor:pointer;
	}
.submit{
	width:64px; 
	height:24px; 
	display:block; 
	bottom:8px; 
	right:8px; 
	position:absolute; 
	cursor:pointer;
	}
	.adv_bg{
		width:480px;
		height:330px;
		position:absolute;
		cursor:pointer; 
		top:33px; 
	    left:10px; 
		}
</style>
</head>
<body>
<div class="wenti">
   <span class="close"><img src="images/close.jpg" /></span>
   <span class="submit"><img src="images/tijiao.jpg" /></span>
   <span class="adv_bg"><img src="images/chuanzhi_bg.png"></span>
</div>
</body>
</html>
