<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>图文混排</title>
<style type="text/css">
body, div, ul, li, ol, dl, dt, p, dd, img, input, a, span, h1, h2, h3, h4 {
	padding: 0;
	margin: 0;
	border: 0;
	list-style: none;
}
a {
	color: orange;
	text-decoration: none;
}
a:hover {
	text-decoration: underline;
}
body {
	background: #ccc;
	font-size: 12px;
	color: #3e3e3e;
}
dl {
	width: 530px;
	height: 210px;
	border:5px solid #F9C;
	border-radius:10px;
	background: #fff;
	margin: 50px auto;
	overflow: hidden;
}
dl dt {
	float: right;
}
dl dd {
	width: 180px;
	float: left;
	margin-left: 10px;
	margin-top: 10px;
}
dd p {
	margin-top: 10px;
	line-height: 20px;
}
</style>
</head>
<body>
<dl>
  <dt> <a href="#"><img src="images/UI.png" width="314" height="212"></dt>
  <dd>
    <h3><a href="#">传智教育UI设计学院</a></h3>
    <p>”UI设计师(简称UID)“已经成为全球性知名IT企业招聘最热门的岗位，正逐渐成为大学毕业生所追捧的热门职业方向。传智教育UI设计学院花一份钱同时学习四门技术，针对平面设计、网页设计、UI设计、Web前端培训一步到位，让你从小白变大神，高薪就业！</p>
  </dd>
</dl>
</body>
</html>
