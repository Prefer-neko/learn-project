<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>绿色导航栏</title>
<style type="text/css">
body, div, ul, li, ol, h1, h2, h3, h4, h5, input, textarea, p {
	margin: 0;
	padding: 0;
}
body {
	font-size: 14px;
	color: #3c3c3c;
	font-family: Arial, Helvetica, sans-serif;
}
a {
	text-decoration: none;
	color: #690;
}
a:hover {
	color: #fff;
	text-decoration: none;
}
ul {
	list-style: none;
}
.banner {
	width: 760px;
	height: 150px;
	margin: 0 auto;
	background-image: url(images/banner_bg.jpg);
}
.nav {
	height: 32px;
	width: 760px;
	margin: 0 auto;
	background-image: url(images/button1_bg.jpg);
}
.nav li {
	float: left;
	width: 80px;
	height: 32px;
	background: url(images/button1.jpg) no-repeat;
}
.nav a {
	display: block;
	width: 80px;
	height: 32px;
	text-align: center;
	line-height: 32px;
}
.nav a:hover {
	background: url(images/button2.jpg) no-repeat;
}
</style>
</head>

<body>
<!--这是banner部分-->
<div class="banner"> <img src="images/banner1.jpg" width="600" height="150" /> </div>
<!-- 这是nav 部分 -->
<div class="nav">
  <ul>
    <li><a href="#">首页导读</a></li>
    <li><a href="#">首页导读</a></li>
    <li><a href="#">首页导读</a></li>

    <li><a href="#">首页导读</a></li>
    <li><a href="#">首页导读</a></li>
  </ul>
</div>
</body>
</html>
