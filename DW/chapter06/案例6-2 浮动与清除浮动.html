<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>浮动与清浮动</title>
<style type="text/css">
body, div, ul, li, ol, h1, h2, h3, h4, h5, input, textarea, p {
	margin: 0;
	padding: 0;
}

.main {
	width: 800px;
	margin:0 auto;
}
.left {
	width: 390px;
	height: 200px;
	background-color: #0FF;
	float: left;
}
.right {
	width: 400px;
	height: 200px;
	background-color:#F90 ;
	float: right;
}
.footer {
	height: 100px;
	width: 800px;
	background-color:#CCC;
	margin: 0 auto
}

</style>
</head>
<body>
<div class="main clearfix">
  <div class="left"></div>
  <div class="right"></div>
</div>
<div class="footer"></div>
</body>
</html>
