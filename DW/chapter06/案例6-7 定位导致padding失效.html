<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>定位导致padding属性失效</title>
<style type="text/css">
body {
	background-color: #c6fff9;
}
#fuqin {
	width: 180px;
	height: 180px;
	padding: 60px;
	border: 10px solid #f57a0d;
	margin:0 auto;
}
.inner {
	position: relative;
}
#erzi {
	position: absolute;
	width: 100px;
	height: 100px;
	background: #4b9f2e;
	top: 0;
	left: 0;
}
</style>
	</head>
	<body>
    <div id="fuqin">
      <div class="inner">
        <div id="erzi"></div>
      </div>
    </div>
</body>
</html>
