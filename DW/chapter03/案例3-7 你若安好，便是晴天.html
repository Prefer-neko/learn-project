<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>你若安好，便是晴天</title>
<style type="text/css">
#all{
	width:800px;
	font-family:"宋体";
	font-size:14px;
	line-height:18px;
	}
h1{
	color:#F0F;
	font-size:18px;
	text-align:center;
	text-decoration:underline;
	}
.part1{
	text-align:center;
	color:red;
	}
.part2{
	color:#00F;
	text-indent:2em;
	letter-spacing:16px;
	white-space:nowrap;        /*强制文本不能换行*/ 
	overflow:hidden;           /*修剪溢出文本*/
	text-overflow:ellipsis;    /*用省略标记标示被修剪的文本*/
	}
.part3{
	color:#090;
	font-weight:bold;
	font-style:italic;
	}
.part4{
	color:#F0F;
	text-decoration:line-through;}
</style>
</head>
<body>
<div id="all">
<h1>你若安好，便是晴天</h1>
<p class="part1">一个人，一本书，一杯茶，一帘梦。</p>
<p class="part2"> 站在时光的十字路口，回望过去的种种单纯与美好，欣慰而悲凉。</p>
<p class="part3">花开花落，风卷云舒。青春如同流沙般从指缝溜走，过去的倔强与轻狂，原来如此荒诞不羁。俗世喧嚣，总会想在空灵停滞的时空内，独倚幽窗，品一壶清茶，细细体味光阴如梭，年华老去。</p>
<p class="part4">时光轮回，生命交替，红尘无尽。</p>
</div>
</body>
</html>
